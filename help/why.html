<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="why.title">Why these courses — Second Chance</title>
  <meta name="description" content="What these courses are, and why they're for you.">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#1A486A">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    /* Page-scoped: a calm, readable reading column for the purpose copy. */
    .why-col { max-width: 42rem; }
    .why-courses { list-style: none; display: grid; gap: var(--space-4); }
    .why-courses li {
      padding-inline-start: var(--space-4);
      border-inline-start: 3px solid var(--color-blue-100);
      line-height: var(--leading-body);
    }
    .why-course__name { color: var(--color-blue); }

    /* --- Lead emphasis. Restrained, meaningful. Brand BLUE only (no red here —
       keep this passage calm). Hierarchy, loudest → quietest:
       .why-pull  >  .why-pivot  >  .why-emph  >  plain.
       The barrier list and everything else stay plain on purpose. --- */

    /* #3 pull-line: the loudest moment — larger, brand blue. The lead-in and the
       pull-line form ONE unit: the lead-in sits tight above the pull-line (so it
       never reads as orphaned) and the generous breathing room is on the group,
       not between the two — avoiding the dead vertical gap. */
    .why-leadpull { margin-block: var(--space-6); max-width: 32rem; }
    .why-leadin { display: block; }            /* lead-in: plain body, its own line */
    .why-pull {
      display: block;
      margin-block-start: var(--space-2);      /* tight to the lead-in */
      color: var(--color-blue);
      font-size: clamp(1.3rem, 1.05rem + 1.4vw, 1.7rem);
      line-height: 1.3;
      letter-spacing: -0.01em;
      text-wrap: balance;
    }

    /* #4 forward pivot: light inline emphasis — lighter than the pull-line. */
    .why-pivot { font-weight: 600; }

    /* #2 structural turn: quiet, texture-level italic (Latin scripts). */
    .why-emph { font-style: italic; }

    /* Arabic has no true italic — never fake a slant. Express the same (quietest)
       tier with a gentle medium weight, kept below .why-pivot so the hierarchy
       holds. (.why-pull and .why-pivot are the durable cross-language emphasis.) */
    :root[lang="ar"] .why-emph { font-style: normal; font-weight: 500; }
  </style>
</head>
<body>
  <div data-include="header"></div>

  <main id="main" class="page">
    <div class="container">
      <a class="back-link" href="../index.html"><span class="chev" aria-hidden="true">‹</span> <span data-i18n="common.back">Back</span></a>

      <div class="page-head">
        <h1 data-i18n="why.title">Why these courses</h1>
      </div>

      <div class="why-col stack-lg">
        <section class="stack-sm">
          <h2 data-i18n="why.lead.heading">A second chance to learn</h2>
          <!-- p1 ends with quiet italic emphasis (.why-emph) on the structural turn -->
          <p data-i18n-html="why.lead.p1"></p>
          <!-- Lead-in flows directly into the set-apart pull-line (one unit, no
               orphan, no dead gap); the "moment" spacing is around the group. -->
          <p class="why-leadpull">
            <span class="why-leadin" data-i18n="why.lead.p2a"></span>
            <span class="why-pull" data-i18n="why.lead.pull"></span>
          </p>
          <!-- p2b carries the lighter inline pivot (.why-pivot) -->
          <p data-i18n-html="why.lead.p2b"></p>
        </section>

        <section class="stack-sm">
          <h2 data-i18n="why.what.heading">Made for real life</h2>
          <p data-i18n="why.what.p"></p>
        </section>

        <section class="stack-sm">
          <h2 data-i18n="why.courses.heading">The courses</h2>
          <ul class="why-courses">
            <li><strong class="why-course__name" data-i18n="course.welcome.title">Welcome</strong> — <span data-i18n="why.courses.welcome.desc"></span></li>
            <li><strong class="why-course__name" data-i18n="course.personal-growth.title">Personal Growth</strong> — <span data-i18n="why.courses.personal-growth.desc"></span></li>
            <li><strong class="why-course__name" data-i18n="course.gender.title">Gender</strong> — <span data-i18n="why.courses.gender.desc"></span></li>
            <li><strong class="why-course__name" data-i18n="course.leadership.title">Leadership</strong> — <span data-i18n="why.courses.leadership.desc"></span></li>
          </ul>
        </section>

        <section class="stack-sm">
          <h2 data-i18n="why.close.heading">Every step is yours</h2>
          <p data-i18n="why.close.p"></p>
        </section>
      </div>

      <div class="btn-row" style="margin-block-start:var(--space-8)">
        <a class="btn btn--primary btn--lg" href="../courses.html">
          <span data-i18n="index.cta.courses">See the courses</span>
          <svg class="arrow" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
    </div>
  </main>

  <div data-include="footer"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/components.js"></script>
</body>
</html>
