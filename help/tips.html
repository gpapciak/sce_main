<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="tips.title">Tips — Second Chance</title>
  <meta name="description" content="Tips for getting the most from the courses.">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#1A486A">
  <link rel="icon" href="../favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/icons/favicon-16.png">
  <link rel="apple-touch-icon" href="../apple-touch-icon.png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div data-include="header"></div>

  <main id="main" class="page">
    <div class="container">
      <a class="back-link" href="../index.html"><span class="chev" aria-hidden="true">‹</span> <span data-i18n="common.back">Back</span></a>

      <div class="page-head stack-sm">
        <h1 data-i18n="tips.heading">Tips for getting the most from the courses</h1>
      </div>

      <div class="stack">
        <div class="notice notice--tip">
          <span class="notice__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg></span>
          <div class="notice__body">
            <strong data-i18n="tips.oneSitting.title">Finish a course in one sitting where you can</strong>
            <p data-i18n="tips.oneSitting.body"></p>
          </div>
        </div>

        <div class="notice notice--warm">
          <span class="notice__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></span>
          <div class="notice__body">
            <strong data-i18n="tips.shared.title">Sharing a device</strong>
            <p data-i18n="tips.shared.body"></p>
          </div>
        </div>

        <div class="notice">
          <span class="notice__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="3" width="10" height="18" rx="2"/><path d="M11 18h2"/></svg></span>
          <div class="notice__body">
            <strong data-i18n="tips.phone.title">Made for your phone</strong>
            <p data-i18n="tips.phone.body"></p>
          </div>
        </div>

        <div class="notice">
          <span class="notice__icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5a7 7 0 0 1 14 0"/><path d="M2 9a11 11 0 0 1 20 0"/><circle cx="12" cy="17" r="1.4"/></svg></span>
          <div class="notice__body">
            <strong data-i18n="tips.data.title">A note on data</strong>
            <p data-i18n="tips.data.body"></p>
          </div>
        </div>
      </div>

      <div class="btn-row" style="margin-block-start:var(--space-7)">
        <a class="btn btn--primary btn--lg" href="../courses.html" data-i18n="courses.heading">Choose a course</a>
      </div>
    </div>
  </main>

  <div data-include="footer"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/components.js"></script>
</body>
</html>
