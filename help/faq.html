<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="faq.title">FAQ — Second Chance</title>
  <meta name="description" content="Frequently asked questions.">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#1A486A">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    /* Accessible accordion, scoped to this page */
    .faq { display: grid; gap: var(--space-3); }
    .faq details {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-xs);
      overflow: hidden;
    }
    .faq summary {
      list-style: none;
      cursor: pointer;
      padding: var(--space-4) var(--space-5);
      font-weight: 600;
      color: var(--color-blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      min-height: 44px;
    }
    .faq summary::-webkit-details-marker { display: none; }
    .faq summary .plus {
      flex-shrink: 0;
      transition: transform var(--dur-2) var(--ease);
      color: var(--color-red-600);
    }
    .faq details[open] summary .plus { transform: rotate(45deg); }
    .faq .faq__a { padding: 0 var(--space-5) var(--space-5); color: var(--color-text-soft); }
  </style>
</head>
<body>
  <div data-include="header"></div>

  <main id="main" class="page">
    <div class="container">
      <a class="back-link" href="../index.html"><span class="chev" aria-hidden="true">‹</span> <span data-i18n="common.back">Back</span></a>

      <div class="page-head stack-sm">
        <h1 data-i18n="faq.heading">Frequently asked questions</h1>
      </div>

      <div class="faq">
        <details>
          <summary><span data-i18n="faq.q1">Do I need an account?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a1"></p>
        </details>
        <details>
          <summary><span data-i18n="faq.q2">Is my information private?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a2"></p>
        </details>
        <details>
          <summary><span data-i18n="faq.q3">Will my progress be saved?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a3"></p>
        </details>
        <details>
          <summary><span data-i18n="faq.q4">Can I use my phone?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a4"></p>
        </details>
        <details>
          <summary><span data-i18n="faq.q5">Do I need internet the whole time?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a5"></p>
        </details>
        <details>
          <summary><span data-i18n="faq.q6">What do I get at the end?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a6"></p>
        </details>
        <details>
          <summary><span data-i18n="faq.q7">Can I do the courses in my language?</span><span class="plus" aria-hidden="true">+</span></summary>
          <p class="faq__a" data-i18n="faq.a7"></p>
        </details>
      </div>

      <div class="btn-row" style="margin-block-start:var(--space-7)">
        <a class="btn btn--primary btn--lg" href="../courses.html" data-i18n="courses.heading">Choose a course</a>
      </div>
    </div>
  </main>

  <div data-include="footer"></div>

  <script src="../js/i18n.js"></script>
  <script src="../js/progress.js"></script>
  <script src="../js/components.js"></script>
</body>
</html>
